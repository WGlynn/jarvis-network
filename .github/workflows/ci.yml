name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  validate:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install (no dev deps)
        run: npm install --omit=dev

      - name: Syntax check
        run: |
          for f in $(find src -name '*.js' -type f); do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Compute binary hash (v0 verifiability commitment)
        id: hash
        run: |
          HASH=$(find src -name '*.js' -type f | sort | xargs sha256sum | sha256sum | awk '{print $1}')
          echo "Binary hash: $HASH"
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Hash commitment (on master only)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          mkdir -p .verifiability
          echo "${{ steps.hash.outputs.hash }}" > .verifiability/binary-hash-${{ github.sha }}.txt
          echo "Committed binary hash for ${{ github.sha }}: ${{ steps.hash.outputs.hash }}"
          # Future: publish hash to a public registry / on-chain contract here.

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test
