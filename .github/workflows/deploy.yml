name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'package.json'
      - 'package-lock.json'
      - 'deploy/fly.toml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to fly.io
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy jarvis-network
        run: flyctl deploy --config deploy/fly.toml --remote-only -a jarvis-network
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify startup
        run: |
          echo "Waiting for JARVIS Network to boot (up to 90s)..."
          for i in $(seq 1 6); do
            sleep 15
            HEALTH=$(curl -sf https://jarvis-network.fly.dev/health 2>/dev/null || echo '{}')
            echo "Attempt $i: $HEALTH"
            if echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "JARVIS Network is online"
              exit 0
            fi
          done
          echo "Health check didn't pass in 90s — deploy succeeded but boot may be slow"
          flyctl logs -a jarvis-network --no-tail 2>&1 | tail -15 || true
          # Don't fail the job — slow boot != failed deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  validate:
    name: Pre-deploy syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --omit=dev
      - name: Syntax check
        run: |
          for f in $(find src -name '*.js' -type f); do
            node --check "$f"
          done
